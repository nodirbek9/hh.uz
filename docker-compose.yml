version: '3.8'

services:

  app:
    build: .
    container_name: hh-web-app
    ports:
      - "7070:7070"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/hh_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1111
      SPRING_DATA_REDIS_HOST: redis
      APP_KEYCLOAK_KEYCLOAK-SERVER-URL: http://keycloak:8080
    networks:
      - hh_web_app-net
    depends_on:
        - redis
        - minio-hh
  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - hh_web_app-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: >
      start-dev
      --features=token-exchange
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: keycloakAdmin
      KEYCLOAK_ADMIN_PASSWORD: keycloakAdmin@1234
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: true
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - hh_web_app-net
  redis:
    image: redis:latest
    container_name: redis_hh
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - hh_web_app-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    container_name: redis-commander
    ports:
      - "9091:9091"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=12345
    depends_on:
      - redis
    networks:
      - hh_web_app-net
  minio-hh:
    image: quay.io/minio/minio
    container_name: minio-hh
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin_username
      MINIO_ROOT_PASSWORD: adminpassword123
    command: server /data --console-address ":9001"
    networks:
      - hh_web_app-net
volumes:
  redis_data:
  minio_data:
  keycloak_db_data:

networks:
  hh_web_app-net:
    driver: bridge